<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Calistenia Oriental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#e23670;
  --primary-dark:#c22a5d;
  --bg:#f4f4f6;
  --card:#ffffff;
  --text:#181818;
  --muted:#6b7280;
  --border:#e6e6e9;
  --radius:14px;
  --maxw:520px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Poppins',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
#app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.05);display:flex;flex-direction:column;}
header{position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--border);}
.progress-outer{height:4px;background:#eee;}
.progress-fill{height:100%;background:var(--primary);transition:width .3s;width:0%;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0 12px;}
.logo-img{height:26px;}
.logo-fallback{display:flex;flex-direction:column;align-items:center;line-height:1;}
.logo-main{font-weight:700;font-size:22px;color:var(--primary);letter-spacing:.5px;}
.logo-sub{font-weight:600;font-size:10.5px;color:var(--primary);letter-spacing:3px;margin-top:3px;}
main{flex:1;padding:26px 20px 44px;animation:fade .25s ease;display:flex;flex-direction:column;justify-content:center;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
h1.question{font-size:20px;font-weight:600;text-align:center;margin:0 0 8px;line-height:1.35;}
h1.question span{color:var(--primary);}
.subtitle{text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 20px;}
.hero-eyebrow{text-align:center;color:var(--muted);letter-spacing:2px;font-size:11.5px;font-weight:600;margin-bottom:20px;text-transform:uppercase;}
.hero-title{font-size:25px;font-weight:700;text-align:center;line-height:1.28;margin-bottom:4px;}
.hero-title span{color:var(--primary);}
.hero-img-side{display:flex;flex-direction:column;gap:18px;align-items:center;margin-bottom:6px;}
.hero-img-side img{width:100%;max-width:260px;border-radius:var(--radius);object-fit:cover;}
@media(min-width:640px){.hero-img-side.side{flex-direction:row;align-items:flex-start;}}
.options{display:flex;flex-direction:column;gap:12px;}
.option{display:flex;align-items:center;gap:12px;background:#f7f7f8;border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;font-weight:500;font-size:14.5px;transition:.15s;user-select:none;}
.option:active{transform:scale(.98);}
.option.selected{border-color:var(--primary);background:#fdeef2;}
.option .icon{font-size:17px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#fdeef2;border-radius:10px;flex-shrink:0;}
.option img.opt-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.option .txt{flex:1;}
.option .desc{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px;}
.option .arrow{color:#c1c1c6;font-size:18px;flex-shrink:0;}
.option .check{width:22px;height:22px;border-radius:50%;border:2px solid #d1d1d6;flex-shrink:0;background:#fff;}
.option.selected .check{border-color:var(--primary);background:var(--primary);box-shadow:inset 0 0 0 4px #fff;}
.grid-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-options .option{flex-direction:column;text-align:center;padding:10px;}
.grid-options img.opt-img,.grid-options .ph{width:100%;height:130px;border-radius:10px;}
.grid-options .txt{margin-top:8px;}
.ph{background:linear-gradient(135deg,#f3d4de,#f7e8ec);display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700;font-size:12.5px;border-radius:10px;text-align:center;padding:6px;}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-weight:600;font-size:13.5px;cursor:pointer;}
.switch{width:40px;height:24px;border-radius:12px;background:#ddd;position:relative;flex-shrink:0;transition:.2s;}
.switch.on{background:var(--primary);}
.switch .dot{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s;}
.switch.on .dot{left:19px;}
.btn-primary{display:block;width:100%;background:var(--primary);color:#fff;border:none;border-radius:30px;padding:16px;font-size:15.5px;font-weight:700;cursor:pointer;margin-top:22px;font-family:inherit;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary:active:not(:disabled){background:var(--primary-dark);}
.info-image{width:100%;border-radius:var(--radius);margin-bottom:22px;object-fit:cover;max-height:280px;display:block;}
.info-title{font-size:21px;font-weight:700;text-align:center;margin:0 0 12px;line-height:1.3;}
.info-title span{color:var(--primary);}
.info-text{color:var(--muted);text-align:center;font-size:14px;line-height:1.55;margin:0;}
.footer-terms{text-align:center;font-size:11px;color:var(--muted);padding:18px 14px 4px;line-height:1.6;}
.footer-terms a{color:var(--text);}
.unit-toggle{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.unit-btn{border:1px solid var(--border);background:#f7f7f8;border-radius:20px;padding:7px 20px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13.5px;}
.unit-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.slider-value{text-align:center;font-size:44px;font-weight:800;margin-bottom:22px;}
.slider-value small{font-size:16px;font-weight:600;color:var(--muted);margin-left:4px;}
.ruler-wrap{position:relative;height:50px;overflow:hidden;margin-bottom:22px;touch-action:none;cursor:grab;}
.ruler-track{position:absolute;top:0;left:0;display:flex;flex-direction:column;will-change:transform;}
.tick-row{display:flex;align-items:flex-end;height:30px;}
.label-row{display:flex;height:16px;}
.tick{width:16px;height:14px;flex-shrink:0;position:relative;}
.tick::after{content:'';position:absolute;left:50%;bottom:0;width:2px;height:100%;background:#dcdce0;transform:translateX(-50%);}
.tick.major{height:26px;}
.tick.major::after{background:#a8a8ae;}
.tick-label{width:16px;flex-shrink:0;text-align:center;font-size:10.5px;color:#8a8a90;}
.ruler-marker{position:absolute;left:50%;top:0;transform:translateX(-50%);color:var(--primary);font-size:18px;pointer-events:none;}
.ruler-hint{text-align:center;color:var(--muted);font-size:11.5px;margin-bottom:20px;margin-top:6px;}
.info-box{background:#f7f7f8;border-radius:12px;padding:14px 16px;font-size:13px;color:var(--text);margin-bottom:10px;line-height:1.5;}
.info-box b{color:var(--primary);}
input[type=text].text-input{width:100%;padding:16px;border:1px solid var(--border);border-radius:12px;font-size:18px;text-align:center;margin-bottom:16px;font-family:inherit;}
.chart-wrap{margin:18px 0;}
.loading-wrap{text-align:center;}
.loading-bar-outer{height:10px;background:#eee;border-radius:6px;overflow:hidden;margin:22px 0 8px;}
.loading-bar-fill{height:100%;background:var(--primary);width:0%;}
.loading-pct{font-weight:700;margin-bottom:22px;color:var(--primary);}
.carousel img,.carousel .ph{width:100%;border-radius:var(--radius);height:220px;}
.gauge-bar{height:14px;border-radius:8px;background:linear-gradient(90deg,#3b82f6,#22c55e 35%,#f59e0b 65%,#ef4444);position:relative;margin:34px 0 8px;}
.gauge-dot{width:16px;height:16px;background:#fff;border:3px solid #181818;border-radius:50%;position:absolute;top:-1px;transform:translate(-50%,-50%);}
.gauge-tag{position:absolute;top:-30px;transform:translateX(-50%);background:#181818;color:#fff;padding:3px 9px;border-radius:6px;font-size:11px;white-space:nowrap;font-weight:600;}
.gauge-labels{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:22px;letter-spacing:.3px;}
.alert-box{background:#fdecec;border:1px solid #f6c6c6;border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.55;margin-bottom:16px;}
.alert-box b{color:#c0392b;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
.stat-row:last-of-type{border-bottom:none;margin-bottom:14px;}
.stat-row .val{font-weight:600;}
.compare-row{display:flex;gap:12px;margin-bottom:18px;align-items:center;}
.compare-col{flex:1;text-align:center;}
.compare-col .lbl{font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.compare-col img,.compare-col .ph{width:100%;height:170px;object-fit:cover;border-radius:12px;}
.arrow-between{color:var(--primary);font-weight:800;font-size:18px;flex-shrink:0;}
.countdown-bar{background:var(--primary);color:#fff;text-align:center;font-size:12px;padding:8px;font-weight:600;letter-spacing:.3px;}
.offer-section{margin:24px 0;}
.offer-section h3{font-size:15px;font-weight:700;text-align:center;margin-bottom:14px;}
.value-item{display:flex;gap:10px;padding:9px 0;font-size:13px;line-height:1.5;}
.value-item .ck{color:#22c55e;font-weight:800;flex-shrink:0;}
.price-box{border:2px solid var(--primary);border-radius:14px;padding:18px;text-align:center;margin:18px 0;background:#fff8fa;}
.price-badge{background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.price-old{text-decoration:line-through;color:var(--muted);font-size:14px;display:block;}
.price-new{font-size:34px;font-weight:700;color:var(--primary);margin:2px 0;}
.price-note{font-size:11.5px;color:var(--muted);}
.testimonial{margin-bottom:22px;}
.testimonial .ph,.testimonial img{width:100%;height:170px;border-radius:12px;object-fit:cover;}
.testimonial .ph{background:#f0eef1;display:flex;align-items:center;justify-content:center;color:#c9c9cd;font-size:26px;}
.testimonial h4{color:var(--primary);margin:10px 0 3px;font-size:13.5px;}
.testimonial .res{font-weight:700;font-size:13px;margin-bottom:5px;}
.testimonial p{font-size:12.5px;color:var(--muted);line-height:1.55;margin:0;}
.shots-row{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 10px;margin-bottom:4px;}
.phone-shot{flex-shrink:0;width:180px;}
.phone-shot img{width:100%;border-radius:16px;border:4px solid #181818;display:block;box-shadow:0 8px 20px rgba(0,0,0,.15);}
.shot-caption{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px;padding:0 4px;}
.quote-only{text-align:center;padding:10px 6px 22px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.quote-only:last-child{border-bottom:none;}
.quote-mark{font-size:38px;color:var(--primary);font-weight:800;line-height:1;margin-bottom:2px;font-family:Georgia,serif;}
.quote-only p{font-size:13.5px;font-style:italic;color:var(--text);line-height:1.55;margin:0 0 10px;}
.quote-who{font-size:12px;font-weight:700;color:var(--primary);}
.quote-who span{font-weight:600;color:var(--muted);}
.badge-guarantee{border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;}
.badge-guarantee h4{margin:8px 0 6px;font-size:14.5px;}
.badge-guarantee p{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0;}
.faq-item{border-bottom:1px solid var(--border);padding:14px 0;cursor:pointer;}
.faq-q{font-weight:600;display:flex;justify-content:space-between;font-size:13.5px;align-items:center;}
.faq-a{color:var(--muted);font-size:12.5px;margin-top:8px;display:none;line-height:1.55;}
.faq-item.open .faq-a{display:block;}
</style>
</head>
<body>
<div id="app">
  <header id="siteHeader">
    <div class="progress-outer"><div class="progress-fill" id="progressFill"></div></div>
    <div class="logo-row">
      <img src="img/logo.png" class="logo-img" alt="Calistenia Oriental" onerror="this.remove();document.getElementById('logoFallback').style.display='flex';">
      <div class="logo-fallback" id="logoFallback" style="display:none">
        <span class="logo-main">CALISTENIA</span>
        <span class="logo-sub">ORIENTAL</span>
      </div>
    </div>
  </header>
  <main id="quizContainer"></main>
</div>
<script>
const CHECKOUT_URL = "COLOQUE_AQUI_O_LINK_DO_SEU_CHECKOUT";
const PRICE_FROM = 297.00;
const PRICE_TO = 37.90;
const EXTRA_SPOTS = 7;

function imgFallback(el){
  const div=document.createElement('div');
  div.className='ph';
  div.innerHTML='<span style="font-size:22px;opacity:.4;">📷</span>';
  el.replaceWith(div);
}
function imgFallbackLabel(el,label){
  const div=document.createElement('div');
  div.className='ph';
  div.textContent=label||'';
  el.replaceWith(div);
}
function fmtMoney(v){
  return 'R$' + v.toFixed(2).replace('.',',');
}
function addDaysLabel(n){
  const d=new Date();
  d.setDate(d.getDate()+n);
  return d.toLocaleDateString('pt-BR',{day:'numeric',month:'long'});
}
function computeBmi(weightKg,heightCm){
  const h=(heightCm||165)/100;
  return (weightKg||70)/(h*h);
}
function bmiCategory(bmi){
  if(bmi<18.5) return {key:'abaixo',label:'Abaixo do peso',msg:'Seu corpo pode estar com pouca massa muscular. A Calistenia Oriental vai te ajudar a ganhar tônus e força de forma saudável.'};
  if(bmi<25) return {key:'normal',label:'Normal',msg:'Você está numa faixa saudável. Vamos usar a Calistenia Oriental pra definir e fortalecer ainda mais o seu corpo.'};
  if(bmi<30) return {key:'sobrepeso',label:'Sobrepeso',msg:'Seu corpo está pedindo um empurrãozinho. A Calistenia Oriental vai ativar seu metabolismo e iniciar a queima de gordura de forma leve e constante.'};
  return {key:'obesidade',label:'Obesidade',msg:'Esse é o momento ideal pra começar. Vamos adaptar o programa ao seu ritmo, com exercícios seguros que respeitam suas articulações.'};
}
function projectedWeight(){
  const current = state.answers.weightKg ?? 70;
  const target = state.answers.targetWeightKg ?? (current-8);
  const diff = current-target;
  const maxSafe=3;
  if(Math.abs(diff)<=maxSafe) return {value:Math.round(target*10)/10, isFinal:true};
  const proj = diff>0 ? current-maxSafe : current+maxSafe;
  return {value:Math.round(proj*10)/10, isFinal:false, target:Math.round(target*10)/10};
}

const SLIDER_CONFIG = {
  height:{
    key:'heightCm', metricUnit:'cm', imperialUnit:'pol',
    metricMin:120, metricMax:220, metricDefault:165, metricMajor:10,
    imperialMin:47, imperialMax:87, imperialMajor:5,
    toImperial:v=>v/2.54, toMetric:v=>v*2.54
  },
  weight:{
    key:'weightKg', metricUnit:'kg', imperialUnit:'Libra',
    metricMin:35, metricMax:180, metricDefault:70, metricMajor:10,
    imperialMin:77, imperialMax:397, imperialMajor:20,
    toImperial:v=>v*2.20462, toMetric:v=>v/2.20462,
    showBmi:true
  },
  targetWeight:{
    key:'targetWeightKg', metricUnit:'kg', imperialUnit:'Libra',
    metricMin:35, metricMax:180, metricDefault:60, metricMajor:10,
    imperialMin:77, imperialMax:397, imperialMajor:20,
    toImperial:v=>v*2.20462, toMetric:v=>v/2.20462
  }
};

const EMOTION_FOCUS_MAP = {
  'Me sentir mais confiante com o meu corpo.':'Autoestima e confiança corporal.',
  'Ficar mais saudável e ter mais energia.':'Saúde geral e nível de energia.',
  'Me sentir bem nas minhas roupas.':'Ajuste e conforto nas roupas do dia a dia.',
  'Recuperar o corpo e a autoestima após o parto.':'Recuperação pós-parto e autoestima.',
  'Outro.':'Transformação física completa.'
};

const STEPS = [
{id:'ageRange', type:'single',
  hero:{eyebrow:'TESTE DE 1 MINUTO', title:'Programa de <span>Calistenia Oriental</span> para Mulheres'},
  question:'Quantos anos você tem?',
  options:['39 – 45','46 – 50','51 – 60','60+'],
  image:'img/hero-idade.jpg', showTerms:true},
{id:'socialProof1', type:'info', image:'img/social-proof.jpg',
  title:'Elas conseguiram e você também pode',
  text:'Milhares de mulheres já transformaram seus corpos com a Calistenia Oriental',
  cta:'Continuar'},
{id:'triedCalisthenics', type:'single',
  question:'Você já experimentou exercícios de calistenia?',
  options:['Sim','Não'], image:'img/hero-experiencia.jpg'},
{id:'differentiation', type:'info', condition:a=>a.triedCalisthenics&&a.triedCalisthenics.label==='Sim',
  image:'img/hero-diferenciacao.jpg',
  title:'Você já tem a base, mas a Calistenia Oriental é diferente da calistenia comum.',
  text:'Enquanto o método tradicional foca apenas em força externa, nossa técnica ativa as <b>fibras profundas</b>, agindo na musculatura interna, onde eliminamos a <b>gordura mais difícil de queimar</b> e destravamos o seu metabolismo de forma definitiva.',
  cta:'Continuar'},
{id:'mainGoal', type:'single',
  question:'Qual é seu <span>principal objetivo</span>?',
  options:[
    {label:'Perder peso', icon:'⚖️'},
    {label:'Desenvolver músculos', icon:'💪'},
    {label:'Manter o peso e ficar em forma', icon:'🧍'},
    {label:'Melhorar a aptidão física', icon:'⚡'}]},
{id:'expectedBenefits', type:'multi',
  question:'O que mais você espera alcançar com este plano?',
  subtitle:'Pode escolher várias opções',
  options:[
    {label:'Aumentar a energia', icon:'🔋'},
    {label:'Melhorar o sono', icon:'🌙'},
    {label:'Reduzir o estresse', icon:'🧠'},
    {label:'Melhorar a postura e a mobilidade', icon:'↔️'},
    {label:'Desenvolver flexibilidade', icon:'✨'}],
  cta:'Continuar'},
{id:'concernZones', type:'multi',
  question:'Quais são as zonas que mais a preocupam?',
  subtitle:'Por favor, selecione todas as opções aplicáveis',
  toggleAll:'Melhorar o corpo inteiro',
  options:[
    {label:'Queixo duplo', img:'img/zona-queixo.jpg'},
    {label:'Braços flácidos', img:'img/zona-bracos.jpg'},
    {label:'Seios caídos', img:'img/zona-seios.jpg'},
    {label:'Gordura da barriga', img:'img/zona-barriga.jpg'},
    {label:'Gordura nos joelhos', img:'img/zona-joelhos.jpg'},
    {label:'Traseiro de alforje', img:'img/zona-traseiro.jpg'}],
  cta:'Próximo passo'},
{id:'targetZones', type:'multi',
  question:'Quais são as suas zonas alvo?',
  subtitle:'Escolha todas as opções aplicáveis',
  options:[
    {label:'Barriga', img:'img/alvo-barriga.jpg'},
    {label:'Bunda', img:'img/alvo-bunda.jpg'},
    {label:'Pernas', img:'img/alvo-pernas.jpg'},
    {label:'Peito', img:'img/alvo-peito.jpg'},
    {label:'Braços', img:'img/alvo-bracos.jpg'},
    {label:'Costas', img:'img/alvo-costas.jpg'}],
  cta:'Próximo passo'},
{id:'mechanism', type:'info', image:'img/hero-mecanismo.jpg',
  title:'Apenas <b>8 minutos</b> por dia — transformarão seu corpo e <span>destravarão o seu metabolismo</span> sem o esforço exaustivo da academia!',
  text:'O Protocolo de Calistenia Oriental utiliza ativações de fibras profundas para derreter a gordura acumulada e chapar a barriga, agindo onde os exercícios comuns de academia não conseguem chegar, de forma simples e definitiva...',
  cta:'Continuar'},
{id:'currentBody', type:'single', layout:'grid',
  question:'Como você descreveria o seu corpo atualmente?',
  options:[
    {label:'Magra', img:'img/corpo-magra.png'},
    {label:'Falsa Magra', img:'img/corpo-falsa-magra.png'},
    {label:'Acima do peso', img:'img/corpo-acima.png'},
    {label:'Sobrepeso', img:'img/corpo-sobrepeso.png'}]},
{id:'dreamBody', type:'single',
  question:'Qual é o corpo dos seus sonhos?',
  options:[
    {label:'Curvado', img:'img/sonho-curvado.jpg'},
    {label:'Magro', img:'img/sonho-magro.jpg'},
    {label:'Em forma', img:'img/sonho-forma.jpg'},
    {label:'Tonificado', img:'img/sonho-tonificado.jpg'},
    {label:'Estou bem com meu corpo', img:'img/sonho-bem.jpg'}]},
{id:'bestShape', type:'single',
  question:'Há quanto tempo você estava na melhor forma da sua vida?',
  options:['1 a 2 anos atrás','3 a 5 anos atrás','Mais de 5 anos atrás','Nunca'],
  image:'img/hero-melhorforma.jpg'},
{id:'sensitivity', type:'multi',
  question:'Você tem dificuldades com algum dos seguintes itens?',
  subtitle:'Por favor, selecione todas as opções aplicáveis',
  options:[
    {label:'Costas sensíveis', img:'img/sens-costas.jpg'},
    {label:'Joelhos sensíveis', img:'img/sens-joelhos.jpg'},
    {label:'Quadril sensível', img:'img/sens-quadril.jpg'},
    {label:'Ombros e braços', img:'img/sens-ombros.jpg'},
    {label:'Panturrilhas e tornozelos', img:'img/sens-panturrilhas.jpg'},
    {label:'Nenhuma das opções acima'}],
  cta:'Próximo passo'},
{id:'comfort', type:'single',
  question:'Você se sente confortável ao se exercitar?',
  options:[
    {label:'Sinto dor/Desconforto', icon:'😔'},
    {label:'Sinto alguma dificuldade', icon:'😐'},
    {label:'Sinto-me confortável', icon:'😊'}]},

STEPS.forEach(s=>{
  if(s.options) s.options = s.options.map(o=> typeof o==='string' ? {label:o} : o);
});

const state = { current:0, answers:{} };

function firstValidIndex(from){
  let i=from;
  while(i<STEPS.length && STEPS[i].condition && !STEPS[i].condition(state.answers)) i++;
  return i;
}
function goNext(){
  const next = firstValidIndex(state.current+1);
  if(next>=STEPS.length) return;
  state.current = next;
  renderStep();
}

function stepShowsProgress(step){
  return step.type!=='loading' && step.type!=='offer';
}
function updateProgress(){
  const step = STEPS[state.current];
  const fill = document.getElementById('progressFill');
  if(!stepShowsProgress(step)){ fill.style.width='0%'; return; }
  const pct = Math.min(100, Math.round(((state.current+1)/STEPS.length)*100));
  fill.style.width = pct+'%';
}

function optionRow(step,opt,idx){
  const grid = step.layout==='grid';
  const media = opt.img
    ? `<img class="opt-img" src="${opt.img}" alt="${opt.label}" onerror="imgFallback(this)">`
    : (grid ? `<div class="ph"><span style="font-size:24px;opacity:.4;">📷</span></div>` : '');
  const icon = opt.icon ? `<span class="icon">${opt.icon}</span>` : '';
  const desc = opt.desc ? `<span class="desc">${opt.desc}</span>` : '';
  const trailing = step.type==='multi' ? `<span class="check"></span>` : (!grid && !opt.img ? `<span class="arrow">›</span>` : '');
  return `<div class="option" data-idx="${idx}">${icon}${media}<span class="txt">${opt.label}${desc}</span>${trailing}</div>`;
}

function buildRuler(containerId,config,initial,unitState,onChange){
  const wrap = document.getElementById(containerId);
  const pxPerUnit = 16;
  let unit = unitState.unit;
  let metricValue = initial;

  function displayRange(){
    return unit==='metric'
      ? {min:config.metricMin, max:config.metricMax, major:config.metricMajor, label:config.metricUnit}
      : {min:config.imperialMin, max:config.imperialMax, major:config.imperialMajor, label:config.imperialUnit};
  }
  function metricToDisplay(v){ return unit==='metric' ? v : config.toImperial(v); }
  function displayToMetric(v){ return unit==='metric' ? v : config.toMetric(v); }

  function renderTicks(){
    const r = displayRange();
    let ticksHtml='', labelsHtml='';
    for(let v=r.min; v<=r.max; v++){
      const isMajor = v % r.major === 0;
      ticksHtml += `<div class="tick ${isMajor?'major':''}"></div>`;
      labelsHtml += `<div class="tick-label">${isMajor?v:''}</div>`;
    }
    wrap.querySelector('.ruler-track').innerHTML = `<div class="tick-row">${ticksHtml}</div><div class="label-row">${labelsHtml}</div>`;
  }
  function positionTrack(dispVal){
    const r = displayRange();
    const wrapWidth = wrap.clientWidth || 320;
    const clamped = Math.max(r.min, Math.min(r.max, dispVal));
    const offset = wrapWidth/2 - (clamped-r.min)*pxPerUnit;
    wrap.querySelector('.ruler-track').style.transform = `translateX(${offset}px)`;
  }
  function updateDisplay(){
    const dispVal = Math.round(metricToDisplay(metricValue)*10)/10;
    document.getElementById(containerId+'Val').textContent = Number.isInteger(dispVal)?dispVal:dispVal.toFixed(1);
    document.getElementById(containerId+'Unit').textContent = displayRange().label;
    positionTrack(dispVal);
    onChange(metricValue, unit);
  }

  renderTicks();
  updateDisplay();

  let dragging=false, startX=0, startDisp=0;
  wrap.addEventListener('pointerdown',e=>{
    dragging=true; startX=e.clientX;
    startDisp = metricToDisplay(metricValue);
    wrap.setPointerCapture(e.pointerId);
    wrap.style.cursor='grabbing';
  });
  wrap.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const deltaPx = e.clientX-startX;
    const r = displayRange();
    let newDisp = startDisp - deltaPx/pxPerUnit;
    newDisp = Math.max(r.min, Math.min(r.max, Math.round(newDisp)));
    metricValue = Math.round(displayToMetric(newDisp)*10)/10;
    updateDisplay();
  });
  function endDrag(e){ dragging=false; wrap.style.cursor='grab'; }
  wrap.addEventListener('pointerup',endDrag);
  wrap.addEventListener('pointercancel',endDrag);
  wrap.addEventListener('pointerleave',endDrag);

  return {
    setUnit(u){ unit=u; renderTicks(); updateDisplay(); },
    getMetric(){ return metricValue; }
  };
}

  const priceBlock = `

      <div class="price-new">por ${fmtMoney(PRICE_TO)}</div>
      <div class="price-note">Desconto válido apenas hoje • Pagamento único • Acesso completo ao programa</div>
      <div class="price-note">🔒 Compra 100% Segura • 30 Dias de Garantia Incondicional</div>
    </div>
    <button class="btn-primary offer-cta" onclick="location.href=CHECKOUT_URL">Obter meu plano personalizado agora</button>`;
  return `
    <div class="countdown-bar">Oferta expira em: <span id="countdownTxt">15:00</span></div>
    <h1 class="info-title" style="margin-top:20px;">Seu plano de <span>Calistenia Oriental</span> está pronto!</h1>
    <p class="info-text">Feito sob medida com base em cada resposta que você deu — é assim que fica o seu programa por dentro:</p>
    <div class="shots-row">${shotsHtml}</div>
    <button class="btn-secondary" onclick="location.href=CHECKOUT_URL" style="margin:16px 0 4px;">Quero começar agora →</button>
    <div class="offer-section">
      <h3>O que você vai receber</h3>
      ${valueHtml}
    </div>
    <div class="offer-section">
      <h3>Quem já está no programa conta</h3>
      ${testHtml}
    </div>
    <div class="offer-section">
      <h3>+Bônus Exclusivos</h3>
      ${bonusHtml}
    </div>
    <div class="badge-guarantee">
      <div style="font-size:26px;">🛡️</div>
      <h4>30 Dias de Garantia Incondicional</h4>
      <p>Não conseguiu bater com a rotina do Protocolo de Calistenia Oriental ou não gostou? Você tem 30 dias pra pedir seu dinheiro de volta, sem burocracia e sem complicações.</p>
    </div>
    <div class="offer-section">
      <h3>Perguntas frequentes</h3>
      ${faqHtml}
    </div>
    <div class="offer-section">
      <h3 style="text-align:center;">Sua transformação começa com uma decisão</h3>
      <p class="info-text">Milhares de mulheres já deram esse passo. Agora é a sua vez de sentir a diferença — no corpo e na autoestima.</p>
    </div>
    ${priceBlock}
    <div class="footer-terms"><a href="#">Termos de Serviço</a> • <a href="#">Política de Privacidade</a></div>
  `;
}

function attachCommonOptionHandlers(step){
  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx = +el.dataset.idx;
      const opt = step.options[idx];
      if(step.type==='multi'){
        el.classList.toggle('selected');
        updateMultiState();
      } else {
        state.answers[step.id] = opt;
        goNext();
      }
    });
  });
}
function updateMultiState(){
  const btn = document.getElementById('continueBtn');
  if(!btn) return;
  btn.disabled = document.querySelectorAll('.option.selected').length===0;
}

function attachHandlers(step){
  if(step.type==='single' || step.type==='multi'){
    attachCommonOptionHandlers(step);
    if(step.type==='multi'){
      updateMultiState();
      document.getElementById('continueBtn').addEventListener('click',()=>{
        const selected = [...document.querySelectorAll('.option.selected')].map(el=>step.options[+el.dataset.idx]);
        state.answers[step.id] = selected;
        goNext();
      });
      if(step.toggleAll){
        document.getElementById('toggleAllSwitch').addEventListener('click',()=>{
          const sw = document.getElementById('toggleAllSwitch');
          const turnOn = !sw.classList.contains('on');
          sw.classList.toggle('on',turnOn);
          document.querySelectorAll('.option').forEach(el=>el.classList.toggle('selected',turnOn));
          updateMultiState();
        });
      }
    }
    if(step.image){
      const wrap = document.querySelector('.hero-img-side');
      if(wrap) wrap.classList.add('side');
    }
  }
  if(step.type==='info'){
    document.getElementById('continueBtn').addEventListener('click',goNext);
  }
  if(step.type==='input-number'){
    const input = document.getElementById('ageInput');
    const btn = document.getElementById('continueBtn');
    input.addEventListener('input',()=>{
      const v = parseInt(input.value,10);
      btn.disabled = !(v>=12 && v<=100);
    });
    btn.addEventListener('click',()=>{
      state.answers.exactAge = parseInt(input.value,10);
      goNext();
    });
  }
  if(step.type==='slider'){
    const cfg = SLIDER_CONFIG[step.kind];
    const unitState = {unit:'metric'};
    const initial = state.answers[cfg.key] || cfg.metricDefault;
    document.getElementById('unitMetric').addEventListener('click',()=>{
      unitState.unit='metric';
      document.getElementById('unitMetric').classList.add('active');
      document.getElementById('unitImperial').classList.remove('active');
      ruler.setUnit('metric');
    });
    document.getElementById('unitImperial').addEventListener('click',()=>{
      unitState.unit='imperial';
      document.getElementById('unitImperial').classList.add('active');
      document.getElementById('unitMetric').classList.remove('active');
      ruler.setUnit('imperial');
    });
    const ruler = buildRuler('ruler'+step.id, cfg, initial, unitState, (metricVal)=>{
      if(cfg.showBmi){
        const bmi = computeBmi(metricVal, state.answers.heightCm||165);
        const cat = bmiCategory(bmi);
        document.getElementById('bmiInfo'+step.id).innerHTML = `<div class="info-box">Seu IMC é <b>${bmi.toFixed(2)}</b>, que é considerado <b>${cat.label.toLowerCase()}</b>.<br>Mantenha-se positivo e concentre-se em uma dieta equilibrada e exercícios.</div>`;
      }
    });
    document.getElementById('continueBtn').addEventListener('click',()=>{
      state.answers[cfg.key] = ruler.getMetric();
      goNext();
    });
  }
  if(step.type==='chart-projection' || step.type==='chart-protocol' || step.type==='gauge' || step.type==='summary'){
    document.getElementById('continueBtn').addEventListener('click',goNext);
  }
  if(step.type==='loading'){
    let pct=0;
    const fill=document.getElementById('loadFill');
    const txt=document.getElementById('loadPct');
    const iv=setInterval(()=>{
      pct += Math.random()*9+5;
      if(pct>=100){ pct=100; clearInterval(iv); setTimeout(goNext,500); }
      fill.style.width=pct+'%';
      txt.textContent=Math.round(pct)+'%';
    },200);
  }
  if(step.type==='offer'){
    document.querySelectorAll('.faq-item').forEach(el=>{
      el.addEventListener('click',()=>el.classList.toggle('open'));
    });
    let secs=15*60;
    const countdownEl=document.getElementById('countdownTxt');
    setInterval(()=>{
      if(secs<=0) return;
      secs--;
      const m=Math.floor(secs/60), s=secs%60;
      countdownEl.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    },1000);
  }
}

function renderStep(){
  const step = STEPS[state.current];
  const main = document.getElementById('quizContainer');
  let html='';
  switch(step.type){
    case 'single':
    case 'multi': html = tplChoice(step); break;
    case 'info': html = tplInfo(step); break;
    case 'input-number': html = tplInput(step); break;
    case 'slider': html = tplSlider(step); break;
    case 'chart-projection': html = tplChartProjection(step); break;
    case 'loading': html = tplLoading(step); break;
    case 'chart-protocol': html = tplProtocol(step); break;
    case 'gauge': html = tplGauge(step); break;
    case 'summary': html = tplSummary(step); break;
    case 'offer': html = tplOffer(step); break;
  }
  main.innerHTML = html;
  attachHandlers(step);
  updateProgress();
  window.scrollTo(0,0);
}

state.current = firstValidIndex(0);
renderStep();
</script>
</body>
</html>
